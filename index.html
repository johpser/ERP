<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QATA - Inicio de Sesión</title>
    <link rel="icon" type="image/png" href="imagenes/icono.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #f4f7f6; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card { 
            width: 100%; 
            max-width: 400px; 
            padding: 40px; 
            border-radius: 15px; 
            background: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .btn-primary { 
            background-color: #007bff; 
            border: none; 
            padding: 12px; 
            font-weight: bold; 
            transition: all 0.3s;
        }
        .btn-primary:hover { background-color: #0056b3; transform: translateY(-1px); }
        .form-label { font-size: 0.75rem; font-weight: bold; color: #555; }
        .logo-login { width: 180px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <img src="imagenes/LOGOQATA.png" class="logo-login" alt="Logo QATA">
            <h5 class="fw-bold text-secondary">SISTEMA DE GESTIÓN</h5>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-uppercase">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="usuario@grupoqata.pe" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-uppercase">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" id="btnIngresar" class="btn btn-primary w-100 shadow-sm">ENTRAR AL SISTEMA</button>
            <div id="errorMessage" class="text-danger small mt-3 text-center" style="display:none; font-weight: 500;"></div>
        </form>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
