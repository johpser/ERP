<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Guías - QATA ASOCIADOS</title>
    <link rel="icon" type="image/png" href="../imagenes/icono.png">
    
    <script type="module">
        import { auth } from '../js/config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = '../index.html';
        });
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; padding-top: 80px; font-family: 'Segoe UI', sans-serif; }
        .nav-blue { background-color: #202224; min-height: 60px; }
        .container-historial { max-width: 1450px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 .5rem 1rem rgba(0,0,0,.05); }
        .search-box { position: relative; }
        .search-box i { position: absolute; left: 15px; top: 10px; color: #aaa; }
        .search-box input { padding-left: 40px; border-radius: 20px; }
        #btnExportarExcel { border-radius: 20px; padding: 0 25px; font-weight: 500; }
        .table { font-size: 0.88rem; vertical-align: middle; }
        .nav-link { color: #ffffff !important; font-weight: bold; border: 1px solid #5a5a5a; border-radius: 5px; margin-left: 10px; font-size: 0.85rem;}
        .nav-link:hover { background: #fffdfd; color: #121213 !important; }
        .nav-link.active { background: #007bff; border-color: #007bff; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark nav-blue fixed-top shadow">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold d-flex align-items-center" href="requerimiento.html">
                    <img src="../imagenes/logo.png" alt="Logo" width="120" height="40" class="me-2">
                </a>
                <div class="collapse navbar-collapse justify-content-end">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="requerimiento.html">GENERAR RQ</a></li>
                        <li class="nav-item"><a class="nav-link" href="historial_reque.html">REQUERIMIENTOS</a></li>
                        <li class="nav-item"><a class="nav-link" href="orden.html">GENERAR OC</a></li>
                        <li class="nav-item"><a class="nav-link" href="historial.html">HISTORIAL OC</a></li>
                        <li class="nav-item"><a class="nav-link" href="guia.html">GENERAR GUIA</a></li>
                        <li class="nav-item"><a class="nav-link active" href="historial2.html">HISTORIAL GUIAS</a></li>
                        <li class="nav-item">
                            <a class="nav-link btn-logout px-3 border-danger text-danger" href="../index.html" id="btnCerrarSesion">
                                <i class="bi bi-box-arrow-right"></i> SALIR
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container-fluid px-md-5">
        <div class="container-historial">
            <div class="row align-items-center mb-4">
                <div class="col-md-5">
                    <h3 class="fw-bold text-primary m-0"><i class="bi bi-truck"></i> Historial de Guías de Remisión</h3>
                    <p class="text-muted small mb-0">Consulta y exporta las guías generadas automáticamente.</p>
                </div>
                <div class="col-md-7">
                    <div class="d-flex gap-2">
                        <div class="search-box flex-grow-1">
                            <i class="bi bi-search"></i>
                            <input type="text" id="busqueda" class="form-control" placeholder="Buscar por GR, Proveedor o Proyecto...">
                        </div>
                        <button id="btnExportarExcel" class="btn btn-success d-flex align-items-center gap-2 shadow-sm">
                            <i class="bi bi-file-earmark-excel"></i> Excel Guías
                        </button>
                    </div>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover border">
                    <thead class="table-light">
                        <tr class="text-center">
                            <th>GUÍA #</th>
                            <th>REFERENCIA OC</th>
                            <th>FECHA</th>
                            <th class="text-start">REMITENTE (PROVEEDOR)</th>
                            <th>PROYECTO DESTINO</th>
                            <th>PUNTO DE LLEGADA</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="tablaHistorialGuias" class="text-center">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="module" src="../js/consultar2.js"></script>
</body>
</html>
